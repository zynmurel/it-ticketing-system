services:
  postgres:
    image: postgres:16-alpine
    container_name: it-ticketing-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing
      POSTGRES_DB: ticketing
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
